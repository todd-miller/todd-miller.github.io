name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec astro check
      - run: pnpm run build
      - run: pnpm run test
      - run: pnpm run test:e2e:install
      - run: pnpm run test:e2e

  mirror:
    # Only mirror on push/dispatch against main, and only if build passed.
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Push to GitHub
        env:
          GH_PUSH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
          GH_REPO: ${{ secrets.GH_REPO }}
        run: |
          git remote add github "https://x-access-token:${GH_PUSH_TOKEN}@github.com/${GH_REPO}.git"
          git push github main:main
